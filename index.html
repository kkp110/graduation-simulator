const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const EMOJIS = ['🌸', '🎓', '✨', '🍀', '📜', '💫', '🌿'];
class Particle {
  constructor() {
    this.reset(true);
  }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : -30;
    this.size = 12 + Math.random() * 16;
    this.speed = 0.3 + Math.random() * 0.8;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.01 + Math.random() * 0.02;
    this.opacity = 0.3 + Math.random() * 0.4;
    this.emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  }
  update() {
    this.y += this.speed;
    this.wobble += this.wobbleSpeed;
    this.x += Math.sin(this.wobble) * 0.3;
    if (this.y > H + 40) { this.reset(false); }
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.font = `${this.size}px serif`;
    ctx.fillText(this.emoji, this.x, this.y);
    ctx.restore();
  }
}
for (let i = 0; i < 28; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

function clamp(v) { return Math.max(5, Math.min(95, v)); }

function applyEffects(effects) {
  const changes = [];
  for (const [key, delta] of Object.entries(effects)) {
    // 2.2倍放大 + ±30%随机波动，让每次选择都真正改变命运
    const variance = 0.7 + Math.random() * 0.6; // 0.7 ~ 1.3
    const amplified = Math.round(delta * 2.2 * variance);
    const old = game.stats[key];
    game.stats[key] = clamp(old + amplified);
    changes.push({ key, delta: amplified, newVal: game.stats[key] });
  }
  return changes;
}

    desc:'十年过去了。你换了很多份工作，搬了很多次家，似乎尝试了很多，但回头看——好像什么都没留下。没有存款，没有稳定的事业。父母的电话你越来越不敢接，同学的聚会找理由推掉。你不知道这十年是怎么过的。但日子还得继续——也许下一个十年，会不一样。',
  };

  // 21. 渐行渐远 — 换了圈子，丢了故人
  if (s.人脉 < 40 && s.幸福 < 48 && s.财富 >= 42) return {
    emoji:'💔', title:'渐行渐远', sub:'我以为我会过得更好',
    desc:'你离开了最初的圈子，以为自己会走向更广阔的天地。但新朋友还没来得及交心，老朋友已经不好意思联系。逢年过节收到群发的祝福，你不知道该回复什么。有些路，走着走着就只剩自己一个人了。',
  };

  // 22. 月光族 — 钱永远不够花
  if (s.财富 < 40 && s.幸福 < 48 && avg < 48) return {
    emoji:'💸', title:'月光族', sub:'工资到账三天光',
    desc:'十年了，你的银行卡余额很少超过四位数。不是不努力，但钱就是存不住——房租、外卖、偶尔的冲动消费，再加上几次不成功的投资。你羡慕那些能攒下钱的人，但自己好像总是差一点。好在你还年轻——也许下一个十年，能学会和钱做朋友。',
  };

  // 23. 社恐晚期 — 越来越不想出门
  if (s.人脉 < 35 && avg < 50) return {
    emoji:'👻', title:'社恐晚期', sub:'外面的世界太吵了',
    desc:'你越来越不喜欢社交了。下班就想回家躺着，周末能不出门就不出门。朋友约你你说"下次一定"，但那个"下次"从来没来过。朋友圈早就关了，微信群全部免打扰。一个人在房间里刷手机到深夜——你觉得这样挺舒服的，但偶尔也会想：这真的是我想要的生活吗？',
  };

  // 24. 后悔药 — 如果当初选了另一条路
  if (s.幸福 < 42 && s.事业 >= 50) return {
    emoji:'😞', title:'后悔药', sub:'得到了想要的，却不快乐',
    desc:'你达到了当初给自己设定的目标——也许是考上了编、也许是升了职、也许是赚到了某个数。但你发现自己并不快乐。每天都在做不喜欢的事，和不喜欢的人打交道。深夜你会想：如果当初选了另一条路，现在的生活会不会不一样？可惜人生没有重来。',
  };

  // 25. 高开低走 — 起点不错，越走越差
  if (s.财富 < 42 && s.事业 < 45 && s.健康 < 48 && avg < 46) return {
    emoji:'📉', title:'高开低走', sub:'一手好牌打得稀烂',
    desc:'刚毕业那几年你其实混得不错。但不知道从什么时候开始，一步错、步步错。也许是信错了人，也许是做错了选择，也许是运气确实不太好。你眼看着同龄人一个个超过你，自己却在往下滑。你不太想承认，但心里清楚：这十年，你辜负了当初那个满怀期待的自己。',
  };

  // === 中等结局：不好不坏，才是大多数 ===

  // 22. 不好不坏 — 没什么特别的，也没什么不好的
  if (avg >= 42 && avg < 55 && s.幸福 >= 40 && s.幸福 < 60) return {
    emoji:'😐', title:'不好不坏', sub:'这样也行，那样也行',
    desc:'你的十年过得不好不坏。工作稳定但没有激情，有几个朋友但不算亲密，身体还行但小毛病不断。你有时候羡慕那些拼出了名堂的人，有时候又庆幸自己没他们那么累。你没什么特别遗憾的，也没什么特别骄傲的。但这不就是大多数人的真实人生吗？没有高光时刻，但也没有至暗深渊。平平常常，能过就行。',
  };

  // 23. 还在摸索 — 十年了，还没找到答案
  if (avg >= 38 && avg < 52 && s.幸福 >= 42) return {
    emoji:'🚧', title:'还在摸索', sub:'人生没有deadline',
    desc:'别人都在晒成就晒娃晒房，你还在想自己到底适合做什么。你不确定现在的工作是不是对的，不确定现在的城市是不是该留的，甚至不确定身边那个人是不是对的人。但你没有很焦虑——因为你发现，那些看起来"成功"的人也未必有答案。十年不够想清楚，那就再想十年。人生没有标准进度表。',
  };

  // 24. 曲线救国 — 走了弯路，但慢慢变好了
  if (s.事业 >= 45 && s.幸福 >= 45 && avg >= 42 && avg < 58) return {
    emoji:'🎯', title:'曲线救国', sub:'跌跌撞撞，但方向对了',
    desc:'你走了不少弯路。换过行业、碰过壁、吃过亏，有几年觉得自己特别失败。但慢慢地，路越走越清晰了。你没有一飞冲天，但你一直在往对的方向走。回头看那些弯路，每一步都教会了你一些东西。你不再是十年前那个迷茫的毕业生了——虽然还没到达想去的地方，但你知道自己正在靠近。',
  };

  // === 综合平衡类 ===

  // 25. 全能选手
  if (avg >= 65) return {
    emoji:'🎪', title:'全能选手', sub:'什么都会一点，什么都还行',
    desc:'你可能是全班最让人羡慕的那种人——不是单项冠军，但门门不差。事业有起色，口袋里有余粮，身体也还健康，朋友三不五时约饭。你可能换过几份工作、谈过几段恋爱、搬过几次家，但每一次变化都让你更清楚自己是谁。从专科毕业时的迷茫到十年后的笃定，你走出了一条属于自己的、不好也不坏但很真实的路。这不就是大多数人最想要的生活吗？',
  };

  // 19. 职场多面手
  if (avg >= 58 && s.事业 >= 55 && s.财富 >= 50) return {
    emoji:'💪', title:'职场多面手', sub:'学历不是天花板，能力才是',
    desc:'你也许起点不高——专科文凭在很多时候确实是个限制，但你用十年证明了：限制只是暂时的。你在行业里稳扎稳打，从基层做到了中层，手下开始管人了，薪资翻了不止一倍。同学里有人读了本科还在找工作，你已经可以面试本科生了。不是学历不重要，而是你靠实力让学历变得不那么重要。',
  };

  // 31. 平凡英雄 — 四个维度都还行才算
  if (s.幸福 >= 45 && s.健康 >= 42 && s.人脉 >= 42 && s.事业 >= 40 && avg >= 44) return {
    emoji:'🌟', title:'平凡英雄', sub:'认真地活着，就是最好的结局',
    desc:'你也许没有惊天动地的成就。但你认真地过好了每一天——对得起自己的工作，关心身边的人，也被他们关心着。周末去逛逛超市，偶尔给自己买一束花，假期回老家陪爸妈吃顿饭。从2026年那个夏天的迷茫到2036年的从容，你走了十年。踏踏实实地活着，就已经很了不起了。',
  };

  // 32. 还过得去 — 不算好也不算差
  if (avg >= 38 && s.幸福 >= 42) return {
    emoji:'🍀', title:'还过得去', sub:'不算好也不算差，但还能过',
    desc:'你的生活没什么好炫耀的，也没什么好抱怨的。工作不算喜欢但能做下去，收入不算高但够花，朋友不算多但有几个真心的。没有大起大落，没有狗血剧情。每天下班后那碗热腾腾的面、周末睡到自然醒的早晨——这样就够了。不是每个人都要活得轰轰烈烈。',
  };

  // 22. 人生行者
  return {
    emoji:'🎓', title:'人生行者', sub:'永远在路上',
    desc:'十年了，你还在前行。从学前教育专业出发，你走过了一些地方，换过几份工作，遇见了很多人，也告别了很多人。没有标准答案，没有终极目标，你只是认真地走着每一步。也许这才是最好的状态：永远在路上，永远有期待。就像当年在琴房里弹的那首曲子——曲终，但人不散。下一个十年，故事才刚刚开始。',
  };
}

// ============ 渲染 ============
const app = document.getElementById('app');

function renderStats() {
  const icons = { 财富:'💰', 事业:'🚀', 幸福:'😊', 人脉:'👥', 健康:'💪' };
  const classes = { 财富:'w', 事业:'c', 幸福:'h', 人脉:'n', 健康:'e' };
  const labels = { 财富:'财富', 事业:'事业', 幸福:'幸福', 人脉:'人脉', 健康:'健康' };
  let html = '<div class="stats-panel"><div class="title">📊 当前状态</div>';
  for (const key of ['财富','事业','幸福','人脉','健康']) {
    const v = game.stats[key];
    html += `
      <div class="stat-row">
        <span class="emoji">${icons[key]}</span>
        <span class="label">${labels[key]}</span>
        <div class="bar-wrap">
          <div class="bar-fill ${classes[key]}" style="width:${v}%"></div>
        </div>
        <span class="val">${v}</span>
      </div>`;
  }
  html += '</div>';
  return html;
}

function renderStageDots() {
  let html = '<div class="stage-dots">';
  for (let i = 0; i < TOTAL_STAGES; i++) {
    let cls = '';
    if (i < game.stage) cls = 'done';
    else if (i === game.stage) cls = 'active';
    html += `<div class="dot ${cls}"></div>`;
  }
  html += '</div>';
  return html;
}

function renderHeader() {
  return `
    <div class="header">
      <span class="icon">🎓</span>
      <h1>各奔东西</h1>
      <div class="sub">2026 届 · 学前教育 · 毕业快乐 🎓</div>
    </div>`;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2100);
}

function renderStage(stageData) {
  let html = renderHeader();
  html += renderStageDots();
  html += renderStats();
  html += `
    <div class="card">
      <span class="year-tag">${stageData.year}</span>
      <span class="event-emoji">${stageData.emoji}</span>
      <div class="scene">${stageData.scene}</div>
    </div>
    <div class="choices">
  `;
  stageData.choices.forEach((ch, i) => {
    const hints = ch.hint ? `<span class="choice-hint">${ch.hint}</span>` : '';
    html += `
      <button class="choice-btn" data-choice="${i}">
        <span class="choice-emoji">${ch.emoji}</span>
        <span class="choice-text">${ch.text}${hints}</span>
      </button>`;
  });
  html += '</div>';
  app.innerHTML = html;

  // 绑定事件
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.choice);
      handleChoice(stageData, idx);
    });
  });
}

function showRandomEvent() {
  const path = game.playerPath;
  // 60% 概率触发路径专属事件，40% 通用事件
  const usePathEvent = Math.random() < 0.6 && PATH_EVENTS[path] && PATH_EVENTS[path].length > 0;
  const pool = usePathEvent ? PATH_EVENTS[path] : COMMON_EVENTS;

  // 从池子里随机选一个
  const evt = pool[Math.floor(Math.random() * pool.length)];

  const changes = applyEffects(evt.stats);
  game.history.push({ type:'event', event: evt, changes, path: game.playerPath });

  const overlay = document.createElement('div');
  overlay.className = 'event-popup';
  let statLines = '';
  changes.forEach(c => {
    const cls = c.delta > 0 ? 'up' : 'down';
    const sign = c.delta > 0 ? '+' : '';
    const icons = { 财富:'💰', 事业:'🚀', 幸福:'😊', 人脉:'👥', 健康:'💪' };
    statLines += `<div class="pop-stat ${cls}">${icons[c.key]} ${c.key} ${sign}${c.delta}</div>`;
  });

  // 路径标签
  const pathLabels = {
    preschool:'🏫 学前路上', corporate:'💼 职场路上', startup:'🚀 创业路上',
    academic:'📚 求学路上', creative:'🎨 创作路上', civil:'🏛️ 体制路上',
    abroad:'✈️ 海外路上', explore:'🧭 探索路上'
  };

  overlay.innerHTML = `
    <div class="popup-card">
      <span class="pop-emoji">${evt.emoji}</span>
      <div class="pop-title">${evt.title}</div>
      <div style="font-size:11px;color:#8b7355;margin-bottom:6px;">${pathLabels[path] || ''}</div>
      <div class="pop-desc">${evt.desc}</div>
      ${statLines}
      <button class="pop-btn">知道了</button>
    </div>`;
  document.body.appendChild(overlay);

  return new Promise(resolve => {
    overlay.querySelector('.pop-btn').addEventListener('click', () => {
      overlay.remove();
      resolve();
    });
  });
}

// 根据阶段和选择更新当前路径
function updatePlayerPath(stage, choiceIdx) {
  // 每个阶段的选项可能将玩家导向不同路径
  const pathTransitions = {
    // Stage 1 (毕业半年): [stay, stay, stay, stay, shift to freelance]
    1: { 3: 'freelance', 4: 'creative' },
    // Stage 2 (一年后): [stay, stay, shift to creative, shift to corporate, stay]
    2: { 2: 'explore', 4: 'creative' },
    // Stage 3 (两年后): 换赛道→corporate, 考编→civil, 副业→creative, 学编程→corporate
    3: { 0: 'corporate', 2: 'civil', 3: 'creative', 4: 'corporate' },
    // Stage 4 (三年之痒): 跳槽→corporate, 缓冲→explore, 做生意→startup
    4: { 0: 'corporate', 3: 'explore', 4: 'startup' },
    // Stage 5 (四年后): [corporate, stay, academic, explore]
    5: { 0: 'corporate', 2: 'academic', 3: 'explore' },
    // Stage 6 (六年): [stay, stay, stay, freelance/creative]
    6: { 3: 'creative' },
    // Stage 7 (八年聚会): no path changes, these are social choices
  };

  const transition = (pathTransitions[stage] || {})[choiceIdx];
  if (transition) {
    game.playerPath = transition;
  }
}

async function handleChoice(stageData, choiceIdx) {
  const choice = stageData.choices[choiceIdx];
  const changes = applyEffects(choice.effects);
  game.history.push({ type:'choice', stage: game.stage, choice: choiceIdx, changes });

  // 记录初始路线 + 更新当前路径
  if (game.stage === 0) {
    const paths = ['academic', 'preschool', 'corporate', 'startup', 'abroad'];
    game.firstChoice = paths[choiceIdx];
    game.playerPath = paths[choiceIdx];
  } else {
    // 后续阶段：根据选择更新路径
    updatePlayerPath(game.stage, choiceIdx);
  }

  game.stage++;

  // 30% 概率触发随机事件 (第一关和最后一关不触发)
  const shouldEvent = game.stage > 0 && game.stage < TOTAL_STAGES && Math.random() < 0.35;
  if (shouldEvent) {
    await showRandomEvent();
  }

  if (game.stage >= TOTAL_STAGES) {
    renderEnding();
  } else {
    renderStage(STAGES[game.stage]);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function renderEnding() {
  game.ended = true;
  const ending = getEnding();
  const s = game.stats;

  let html = renderHeader();
  html += `
    <div class="card ending-card">
      <span class="ending-emoji">${ending.emoji}</span>
      <div class="ending-title">${ending.title}</div>
      <div class="ending-sub">${ending.sub}</div>
      <div class="ending-desc">${ending.desc}</div>
      <div class="ending-stats">
        <div class="end-stat"><div class="end-stat-val" style="color:#c8963e">💰 ${s.财富}</div><div class="end-stat-label">财富</div></div>
        <div class="end-stat"><div class="end-stat-val" style="color:#5b7fa5">🚀 ${s.事业}</div><div class="end-stat-label">事业</div></div>
        <div class="end-stat"><div class="end-stat-val" style="color:#d4896b">😊 ${s.幸福}</div><div class="end-stat-label">幸福</div></div>
        <div class="end-stat"><div class="end-stat-val" style="color:#6b9b6b">👥 ${s.人脉}</div><div class="end-stat-label">人脉</div></div>
        <div class="end-stat"><div class="end-stat-val" style="color:#8b6ba0">💪 ${s.健康}</div><div class="end-stat-label">健康</div></div>
      </div>
      <button class="share-btn" onclick="shareResult()">📤 分享给同学</button>
      <button class="replay-btn" onclick="resetGame()">🔄 再来一次</button>
    </div>
  `;
  app.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shareResult() {
  const ending = getEnding();
  const s = game.stats;
  const text = `🎓 我在「各奔东西」毕业人生模拟器中走过了十年！

我是2026届学前教育专科毕业生
🏆 我的结局：${ending.title}

💰 财富:${s.财富} 🚀 事业:${s.事业} 😊 幸福:${s.幸福}
👥 人脉:${s.人脉} 💪 健康:${s.健康}

你的十年后是什么样子？来试试吧！

#毕业季 #各奔东西 #2026毕业 #人生模拟器`;

  if (navigator.share) {
    navigator.share({ title: '各奔东西 · 毕业人生模拟器', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      showToast('✅ 已复制到剪贴板，分享给同学吧！');
    }).catch(() => {
      showToast('📤 长按截图分享给同学吧！');
    });
  }
}

function resetGame() {
  game = {
    stage: 0,
    stats: { 财富: 50, 事业: 50, 幸福: 50, 人脉: 50, 健康: 50 },
    history: [],
    eventsTriggered: new Set(),
    ended: false,
    firstChoice: null,
    playerPath: 'explore',
  };
  renderStage(STAGES[0]);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============ 启动 ============
renderStage(STAGES[0]);

// ============ PWA 离线支持 ============
// 注册 Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' }).then(reg => {
      console.log('✅ SW 已注册，离线可用:', reg.scope);
    }).catch(err => {
      console.log('SW 注册失败（非 HTTPS 环境忽略）:', err.message);
    });
  });
}

// 移动端提示：微信浮窗 / Safari添加到主屏幕
(function() {
  const ua = navigator.userAgent.toLowerCase();
  const isWeChat = /micromessenger/.test(ua);
  const isIOS = /iphone|ipad|ipod/.test(ua);
  const isSafari = /safari/.test(ua) && !/crios/.test(ua) && !/micromessenger/.test(ua);
  const isStandalone = window.navigator.standalone;
  const isMobile = /mobile|android/.test(ua);

  // 微信内：提示浮窗 / 浏览器：提示添加到桌面
  if ((isWeChat || (isIOS && isSafari && !isStandalone) || (!isIOS && isMobile && !isWeChat)) && !isStandalone) {
    setTimeout(() => {
      const hint = document.getElementById('pwa-hint');
      if (hint) {
        if (isWeChat) {
          hint.innerHTML = '💡 点右上角 <b>···</b> → <b>浮窗</b><br>随时回到游戏，不丢失进度';
        } else if (isIOS) {
          hint.innerHTML = '💡 点底部 <b>分享</b> → <b>添加到主屏幕</b><br>变成桌面 App，没网也能玩';
        } else {
          hint.innerHTML = '💡 点右上角菜单 → <b>添加到主屏幕</b><br>变成桌面 App，没网也能玩';
        }
        hint.style.display = 'block';
      }
      setTimeout(() => { if (hint) hint.style.display = 'none'; }, 8000);
    }, 2000);
  }
})();
</script>
