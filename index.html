<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffef9;
    --text: #3d3226;
    --sub: #8b7355;
    --gold: #c8963e;
    --blue: #5b7fa5;
    --green: #6b9b6b;
    --red: #c46b6b;
    --purple: #8b6b9b;
    --bar-bg: #e8e0d5;
    --shadow: 0 2px 16px rgba(60,40,20,0.08);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    width: 100%;
    max-width: 440px;
    min-height: 100dvh;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
  }

  /* ===== Particles ===== */
  #particles {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  /* ===== Header ===== */
  .header {
    text-align: center;
    padding: 10px 0 6px;
    position: relative;
    z-index: 1;
  }
  .header .icon { font-size: 52px; display: block; animation: float 3s ease-in-out infinite; }
  .header h1 { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: 2px; margin: 4px 0 0; }
  .header .sub { font-size: 13px; color: var(--sub); letter-spacing: 4px; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }

  /* ===== Stage indicator ===== */
  .stage-dots {
    display: flex; justify-content: center; gap: 8px;
    padding: 16px 0; position: relative; z-index: 1;
  }
  .stage-dots .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #d5ccc0; transition: all 0.4s;
  }
  .stage-dots .dot.done { background: var(--gold); }
  .stage-dots .dot.active { background: var(--gold); transform: scale(1.5); box-shadow: 0 0 12px rgba(200,150,62,0.4); }

  /* ===== Stats ===== */
  .stats-panel {
    background: var(--card); border-radius: var(--radius);
    padding: 16px 18px; box-shadow: var(--shadow);
    margin-bottom: 16px; position: relative; z-index: 1;
  }
  .stats-panel .title {
    font-size: 12px; color: var(--sub); letter-spacing: 3px;
    text-align: center; margin-bottom: 12px;
  }
  .stat-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;

  .stat-row:last-child { margin-bottom: 0; }
  .stat-row .emoji { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
  .stat-row .label { font-size: 13px; width: 36px; flex-shrink: 0; color: var(--text); }
  .stat-row .bar-wrap {
    flex: 1; height: 8px; background: var(--bar-bg); border-radius: 4px;
    overflow: hidden; position: relative;
  }
  .stat-row .bar-fill {
    height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .stat-row .bar-fill.w { background: linear-gradient(90deg, #d4a84b, #f0c060); }
  .stat-row .bar-fill.c { background: linear-gradient(90deg, #5b8fb5, #7ab8e0); }
  .stat-row .bar-fill.h { background: linear-gradient(90deg, #d4896b, #f0a080); }
  .stat-row .bar-fill.n { background: linear-gradient(90deg, #7b9b6b, #a0c880); }
  .stat-row .bar-fill.e { background: linear-gradient(90deg, #8b6ba0, #b890d0); }
  .stat-row .val { font-size: 11px; color: var(--sub); width: 28px; text-align: right; flex-shrink: 0; }

  .card {
    background: var(--card); border-radius: var(--radius);
    padding: 24px 20px; box-shadow: var(--shadow);
    position: relative; z-index: 1;
    animation: cardIn 0.5s ease-out;

  /* ===== Event Popup ===== */
  .event-popup {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); display: flex; align-items: center;

  .event-popup .popup-card {

  .event-popup .pop-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .event-popup .pop-desc { font-size: 14px; color: var(--sub); line-height: 1.6; margin-bottom: 8px; }
  .event-popup .pop-stat { font-size: 13px; margin: 4px 0; font-weight: 600; }

const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const EMOJIS = ['🌸', '🎓', '✨', '🍀', '📜', '💫', '🌿'];
class Particle {
  constructor() {
    this.reset(true);
  }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : -30;
    this.size = 12 + Math.random() * 16;
    this.speed = 0.3 + Math.random() * 0.8;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.01 + Math.random() * 0.02;
    this.opacity = 0.3 + Math.random() * 0.4;
    this.emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  }
  update() {
    this.y += this.speed;
    this.wobble += this.wobbleSpeed;
    this.x += Math.sin(this.wobble) * 0.3;
    if (this.y > H + 40) { this.reset(false); }
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.font = `${this.size}px serif`;
    ctx.fillText(this.emoji, this.x, this.y);
    ctx.restore();
  }
}
for (let i = 0; i < 28; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

  stage: 0,
  stats: { 财富: 50, 事业: 50, 幸福: 50, 人脉: 50, 健康: 50 },

function clamp(v) { return Math.max(5, Math.min(95, v)); }

function applyEffects(effects) {
  const changes = [];
  for (const [key, delta] of Object.entries(effects)) {
    const old = game.stats[key];
    game.stats[key] = clamp(old + delta);
    changes.push({ key, delta, newVal: game.stats[key] });
  }
  return changes;
}

// ============ 渲染 ============
const app = document.getElementById('app');

function renderStats() {
  const icons = { 财富:'💰', 事业:'🚀', 幸福:'😊', 人脉:'👥', 健康:'💪' };
  const classes = { 财富:'w', 事业:'c', 幸福:'h', 人脉:'n', 健康:'e' };
  const labels = { 财富:'财富', 事业:'事业', 幸福:'幸福', 人脉:'人脉', 健康:'健康' };
  let html = '<div class="stats-panel"><div class="title">📊 当前状态</div>';
  for (const key of ['财富','事业','幸福','人脉','健康']) {
    const v = game.stats[key];
    html += `
      <div class="stat-row">
        <span class="emoji">${icons[key]}</span>
        <span class="label">${labels[key]}</span>
        <div class="bar-wrap">
          <div class="bar-fill ${classes[key]}" style="width:${v}%"></div>
        </div>
        <span class="val">${v}</span>
      </div>`;
  }
  html += '</div>';
  return html;
}

function renderStageDots() {
  let html = '<div class="stage-dots">';
  for (let i = 0; i < TOTAL_STAGES; i++) {
    let cls = '';
    if (i < game.stage) cls = 'done';
    else if (i === game.stage) cls = 'active';
    html += `<div class="dot ${cls}"></div>`;
  }
  html += '</div>';
  return html;
}

function renderHeader() {
  return `
    <div class="header">
      <span class="icon">🎓</span>
      <h1>各奔东西</h1>
      <div class="sub">2026 届 · 学前教育 · 毕业快乐 🎓</div>
    </div>`;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2100);
}

function renderStage(stageData) {
  let html = renderHeader();
  html += renderStageDots();
  html += renderStats();
  html += `
    <div class="card">
      <span class="year-tag">${stageData.year}</span>
      <span class="event-emoji">${stageData.emoji}</span>
      <div class="scene">${stageData.scene}</div>
    </div>
    <div class="choices">
  `;
  stageData.choices.forEach((ch, i) => {
    const hints = ch.hint ? `<span class="choice-hint">${ch.hint}</span>` : '';
    html += `
      <button class="choice-btn" data-choice="${i}">
        <span class="choice-emoji">${ch.emoji}</span>
        <span class="choice-text">${ch.text}${hints}</span>
      </button>`;
  });
  html += '</div>';
  app.innerHTML = html;

  // 绑定事件
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.choice);
      handleChoice(stageData, idx);
    });
  });
}

function showRandomEvent() {
  // 选一个还没触发过的事件
  const available = RANDOM_EVENTS.filter((_, i) => !game.eventsTriggered.has(i));
  if (available.length === 0) return false;
  const idx = RANDOM_EVENTS.indexOf(available[Math.floor(Math.random() * available.length)]);
  const evt = RANDOM_EVENTS[idx];
  game.eventsTriggered.add(idx);

  const changes = applyEffects(evt.stats);
  game.history.push({ type:'event', event: evt, changes });

  const overlay = document.createElement('div');
  overlay.className = 'event-popup';
  let statLines = '';
  changes.forEach(c => {
    const cls = c.delta > 0 ? 'up' : 'down';
    const sign = c.delta > 0 ? '+' : '';
    const icons = { 财富:'💰', 事业:'🚀', 幸福:'😊', 人脉:'👥', 健康:'💪' };
    statLines += `<div class="pop-stat ${cls}">${icons[c.key]} ${c.key} ${sign}${c.delta}</div>`;
  });

  overlay.innerHTML = `
    <div class="popup-card">
      <span class="pop-emoji">${evt.emoji}</span>
      <div class="pop-title">${evt.title}</div>
      <div class="pop-desc">${evt.desc}</div>
      ${statLines}
      <button class="pop-btn">知道了</button>
    </div>`;
  document.body.appendChild(overlay);

  return new Promise(resolve => {
    overlay.querySelector('.pop-btn').addEventListener('click', () => {
      overlay.remove();
      resolve();
    });
  });
}

async function handleChoice(stageData, choiceIdx) {
  const choice = stageData.choices[choiceIdx];
  const changes = applyEffects(choice.effects);
  game.history.push({ type:'choice', stage: game.stage, choice: choiceIdx, changes });

  // 记录初始路线
  if (game.stage === 0) {
    const paths = ['shenben', 'youyuan', 'zhuanhang', 'chuangye'];
    game.firstChoice = paths[choiceIdx];
  }

  game.stage++;

  // 30% 概率触发随机事件 (第一关和最后一关不触发)
  const shouldEvent = game.stage > 0 && game.stage < TOTAL_STAGES && Math.random() < 0.35;
  if (shouldEvent) {
    await showRandomEvent();
  }

  if (game.stage >= TOTAL_STAGES) {
    renderEnding();
  } else {
    renderStage(STAGES[game.stage]);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function renderEnding() {
  game.ended = true;
  const ending = getEnding();
  const s = game.stats;

  let html = renderHeader();
  html += `
    <div class="card ending-card">
      <span class="ending-emoji">${ending.emoji}</span>
      <div class="ending-title">${ending.title}</div>
      <div class="ending-sub">${ending.sub}</div>
      <div class="ending-desc">${ending.desc}</div>
      <div class="ending-stats">
        <div class="end-stat"><div class="end-stat-val" style="color:#c8963e">💰 ${s.财富}</div><div class="end-stat-label">财富</div></div>
        <div class="end-stat"><div class="end-stat-val" style="color:#5b7fa5">🚀 ${s.事业}</div><div class="end-stat-label">事业</div></div>
        <div class="end-stat"><div class="end-stat-val" style="color:#d4896b">😊 ${s.幸福}</div><div class="end-stat-label">幸福</div></div>
        <div class="end-stat"><div class="end-stat-val" style="color:#6b9b6b">👥 ${s.人脉}</div><div class="end-stat-label">人脉</div></div>
        <div class="end-stat"><div class="end-stat-val" style="color:#8b6ba0">💪 ${s.健康}</div><div class="end-stat-label">健康</div></div>
      </div>
      <button class="share-btn" onclick="shareResult()">📤 分享给同学</button>
      <button class="replay-btn" onclick="resetGame()">🔄 再来一次</button>
    </div>
  `;
  app.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shareResult() {
  const ending = getEnding();
  const s = game.stats;
  const text = `🎓 我在「各奔东西」毕业人生模拟器中走过了十年！

我是2026届学前教育专科毕业生
🏆 我的结局：${ending.title}

💰 财富:${s.财富} 🚀 事业:${s.事业} 😊 幸福:${s.幸福}
👥 人脉:${s.人脉} 💪 健康:${s.健康}

你的十年后是什么样子？来试试吧！

#毕业季 #各奔东西 #2026毕业 #人生模拟器`;

  if (navigator.share) {
    navigator.share({ title: '各奔东西 · 毕业人生模拟器', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      showToast('✅ 已复制到剪贴板，分享给同学吧！');
    }).catch(() => {
      showToast('📤 长按截图分享给同学吧！');
    });
  }
}

function resetGame() {
  game = {
    stage: 0,
    stats: { 财富: 50, 事业: 50, 幸福: 50, 人脉: 50, 健康: 50 },
    history: [],
    eventsTriggered: new Set(),
    ended: false,
  };
  renderStage(STAGES[0]);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============ 启动 ============
renderStage(STAGES[0]);
</script>
